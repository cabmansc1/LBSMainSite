<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>{{BUSINESS_NAME}} | Connect With Us</title>    <!-- Google Fonts -->    <link rel="preconnect" href="https://fonts.googleapis.com">    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">        <style>        :root {            --bg-primary: #1a1f2e;            --bg-card: rgba(255, 255, 255, 0.03);            --accent: {{ACCENT_COLOR}};            --accent-glow: {{ACCENT_COLOR}}26;            --text-primary: #ffffff;            --text-secondary: rgba(255, 255, 255, 0.7);            --border: rgba(255, 255, 255, 0.08);        }        * {            margin: 0;            padding: 0;            box-sizing: border-box;        }        body {            font-family: 'Outfit', sans-serif;            background: var(--bg-primary);            min-height: 100vh;            display: flex;            justify-content: center;            align-items: center;            padding: 40px 20px;            position: relative;            overflow-x: hidden;        }        body::before {            content: '';            position: fixed;            top: 0;            left: 0;            right: 0;            bottom: 0;            background:                 radial-gradient(ellipse at 20% 20%, var(--accent-glow) 0%, transparent 50%),                radial-gradient(ellipse at 80% 80%, rgba(100, 130, 180, 0.08) 0%, transparent 50%);            pointer-events: none;            z-index: 0;        }        .container {            width: 100%;            max-width: 420px;            position: relative;            z-index: 1;        }        .profile {            text-align: center;            margin-bottom: 40px;            animation: fadeInDown 0.6s ease-out;        }        @keyframes fadeInDown {            from { opacity: 0; transform: translateY(-20px); }            to { opacity: 1; transform: translateY(0); }        }        .profile-image {            width: 110px;            height: 110px;            border-radius: 50%;            object-fit: cover;            border: 3px solid var(--accent);            margin-bottom: 20px;            box-shadow: 0 0 40px var(--accent-glow);            background: var(--bg-card);        }        .business-name {            font-family: 'DM Serif Display', serif;            font-size: 32px;            color: var(--text-primary);            margin-bottom: 8px;            letter-spacing: 0.5px;        }        .tagline {            font-size: 15px;            color: var(--text-secondary);            font-weight: 300;            letter-spacing: 0.3px;        }        /* Contact Info */        .contact-info {            display: flex;            justify-content: center;            gap: 24px;            margin-bottom: 24px;            flex-wrap: wrap;            animation: fadeInUp 0.5s ease-out 0.05s backwards;        }        .contact-item {            display: flex;            align-items: center;            gap: 8px;            color: var(--accent);            text-decoration: none;            font-size: 15px;            font-weight: 500;            transition: opacity 0.2s ease;        }        .contact-item:hover { opacity: 0.8; }        .contact-icon {            width: 18px;            height: 18px;            stroke: var(--accent);        }        /* Business Details */        .business-details {            background: var(--bg-card);            border: 1px solid var(--border);            border-radius: 14px;            padding: 20px 24px;            margin-bottom: 24px;            animation: fadeInUp 0.5s ease-out 0.08s backwards;        }        .detail-text {            display: flex;            align-items: center;            gap: 12px;            color: var(--text-secondary);            font-size: 14px;            line-height: 1.5;        }        .detail-text + .detail-text { margin-top: 12px; }        .detail-icon {            width: 18px;            height: 18px;            flex-shrink: 0;            stroke: var(--accent);            opacity: 0.8;        }        /* Links Section */        .links {            display: flex;            flex-direction: column;            gap: 14px;        }        .link-button {            display: flex;            align-items: center;            gap: 16px;            padding: 18px 24px;            background: var(--bg-card);            border: 1px solid var(--border);            border-radius: 14px;            text-decoration: none;            color: var(--text-primary);            font-weight: 400;            font-size: 16px;            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);            position: relative;            overflow: hidden;            animation: fadeInUp 0.5s ease-out backwards;        }        .link-button:nth-child(1) { animation-delay: 0.1s; }        .link-button:nth-child(2) { animation-delay: 0.2s; }        .link-button:nth-child(3) { animation-delay: 0.3s; }        .link-button:nth-child(4) { animation-delay: 0.4s; }        @keyframes fadeInUp {            from { opacity: 0; transform: translateY(20px); }            to { opacity: 1; transform: translateY(0); }        }        .link-button::before {            content: '';            position: absolute;            top: 0;            left: 0;            right: 0;            bottom: 0;            background: linear-gradient(135deg, var(--accent-glow) 0%, transparent 60%);            opacity: 0;            transition: opacity 0.3s ease;        }        .link-button:hover {            transform: translateY(-3px);            border-color: var(--accent);            box-shadow: 0 10px 40px var(--accent-glow);        }        .link-button:hover::before { opacity: 1; }        .link-icon {            width: 24px;            height: 24px;            flex-shrink: 0;            position: relative;            z-index: 1;        }        .link-text {            position: relative;            z-index: 1;            flex-grow: 1;        }        .link-arrow {            width: 18px;            height: 18px;            opacity: 0.4;            transition: all 0.3s ease;            position: relative;            z-index: 1;        }        .link-button:hover .link-arrow {            opacity: 1;            transform: translateX(4px);            color: var(--accent);        }        /* Hide empty links */        .link-button[href=""], .link-button[href="#"] { display: none; }        /* Footer */        .footer {            text-align: center;            margin-top: 50px;            padding-top: 30px;            border-top: 1px solid var(--border);            animation: fadeInUp 0.5s ease-out 0.5s backwards;        }        .footer-text {            font-size: 13px;            color: var(--text-secondary);            opacity: 0.6;        }        .footer-link {            color: var(--accent);            text-decoration: none;            transition: opacity 0.2s ease;        }        .footer-link:hover { opacity: 0.8; }        @media (max-width: 480px) {            .business-name { font-size: 26px; }            .link-button { padding: 16px 20px; }        }    </style></head><body>    <div class="container">        <!-- Profile Section -->        <div class="profile">            <img src="{{IMAGE_FILE}}" alt="{{BUSINESS_NAME}}" class="profile-image">            <h1 class="business-name">{{BUSINESS_NAME}}</h1>            <p class="tagline">{{TAGLINE}}</p>        </div>        <!-- Contact Info -->        <div class="contact-info">            <a href="tel:{{PHONE_LINK}}" class="contact-item">                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">                    <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>                </svg>                <span>{{PHONE_DISPLAY}}</span>            </a>            <a href="mailto:{{EMAIL}}" class="contact-item">                <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>                    <polyline points="22,6 12,13 2,6"/>                </svg>                <span>{{EMAIL}}</span>            </a>        </div>        <!-- Business Details -->        <div class="business-details">            <p class="detail-text">                <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>                    <circle cx="12" cy="10" r="3"/>                </svg>                {{ADDRESS}}            </p>            <p class="detail-text">                <svg class="detail-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">                    <circle cx="12" cy="12" r="10"/>                    <polyline points="12 6 12 12 16 14"/>                </svg>                {{HOURS}}            </p>        </div>        <!-- Social Links -->        <div class="links">            <a href="{{FACEBOOK_URL}}" target="_blank" rel="noopener" class="link-button">                <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor">                    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>                </svg>                <span class="link-text">Follow us on Facebook</span>                <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">                    <path d="M5 12h14M12 5l7 7-7 7"/>                </svg>            </a>            <a href="{{INSTAGRAM_URL}}" target="_blank" rel="noopener" class="link-button">                <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor">                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>                </svg>                <span class="link-text">Follow us on Instagram</span>                <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">                    <path d="M5 12h14M12 5l7 7-7 7"/>                </svg>            </a>            <a href="{{YELP_URL}}" target="_blank" rel="noopener" class="link-button">                <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor">                    <path d="M20.16 12.594l-4.995 1.433c-.96.276-1.74-.8-1.176-1.63l2.905-4.308a1.072 1.072 0 011.596-.206 9.194 9.194 0 012.364 3.252 1.073 1.073 0 01-.694 1.459zm-3.8 5.834a1.073 1.073 0 01-.598 1.394 9.315 9.315 0 01-3.978.94 1.074 1.074 0 01-1.122-1.29l.867-5.137c.17-.994 1.51-1.198 1.986-.295l2.845 5.388zm-8.612.63a1.073 1.073 0 01-1.474-.447 9.396 9.396 0 01-.978-3.94 1.073 1.073 0 011.066-1.2l5.22.062c1.01.012 1.485 1.26.7 1.85l-4.534 3.675zm-1.88-9.896a1.073 1.073 0 01-.19-1.543 9.333 9.333 0 013.054-2.513 1.073 1.073 0 011.521.64l1.67 4.991c.323.967-.726 1.846-1.584 1.328l-4.47-2.903zm2.913-5.588a1.073 1.073 0 01.623-1.378A9.222 9.222 0 0112.23 1.5c.92 0 1.818.116 2.674.335a1.073 1.073 0 01.623 1.593L12.29 9.253c-.552.886-1.922.568-2.027-.47l-.722-5.219z"/>                </svg>                <span class="link-text">Read our Yelp Reviews</span>                <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">                    <path d="M5 12h14M12 5l7 7-7 7"/>                </svg>            </a>            <a href="{{GOOGLE_URL}}" target="_blank" rel="noopener" class="link-button">                <svg class="link-icon" viewBox="0 0 24 24" fill="currentColor">                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>                </svg>                <span class="link-text">Find us on Google</span>                <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">                    <path d="M5 12h14M12 5l7 7-7 7"/>                </svg>            </a>        </div>        <!-- Footer -->        <div class="footer">            <p class="footer-text">                Powered by <a href="https://lowcountrybusinessspotlight.com" class="footer-link">Lowcountry Business Spotlight</a>            </p>        </div>    </div></body></html>
